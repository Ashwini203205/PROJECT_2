<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Order History - Track your orders and transaction status">
    <title>Orders | NovaPay</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/animations.css">
    <style>
        .page-header {
            padding: 120px 0 2rem;
            text-align: center;
            position: relative;
            z-index: 1
        }

        /* Success Banner */
        .success-banner {
            max-width: 700px;
            margin: 0 auto 3rem;
            padding: 3rem;
            border-radius: var(--radius-lg);
            background: rgba(16, 185, 129, 0.08);
            border: 1px solid rgba(16, 185, 129, 0.25);
            text-align: center;
            position: relative;
            z-index: 1;
            animation: fadeInUp 0.6s ease
        }

        .success-icon {
            font-size: 4rem;
            margin-bottom: 1rem;
            animation: bounceIn 0.6s ease 0.3s both
        }

        @keyframes bounceIn {
            0% {
                transform: scale(0)
            }

            50% {
                transform: scale(1.2)
            }

            100% {
                transform: scale(1)
            }
        }

        .success-banner h2 {
            font-size: 1.8rem;
            font-weight: 800;
            margin-bottom: 0.5rem;
            color: var(--success-light)
        }

        .success-banner p {
            color: var(--text-secondary);
            margin-bottom: 1.5rem
        }

        .success-details {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            text-align: left;
            margin-bottom: 2rem
        }

        .success-detail {
            padding: 1rem;
            border-radius: var(--radius-md);
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid var(--border-color)
        }

        .success-detail-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            color: var(--text-muted);
            letter-spacing: 0.05em;
            margin-bottom: 4px
        }

        .success-detail-value {
            font-size: 0.9rem;
            font-weight: 600;
            font-family: var(--font-mono);
            color: var(--accent)
        }

        .success-actions {
            display: flex;
            gap: 1rem;
            justify-content: center
        }

        /* Orders List */
        .orders-container {
            max-width: 900px;
            margin: 0 auto;
            position: relative;
            z-index: 1;
            padding-bottom: 4rem
        }

        .orders-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 40vh;
            gap: 1.5rem;
            text-align: center
        }

        .orders-empty svg {
            opacity: 0.2
        }

        .orders-empty h3 {
            font-size: 1.3rem
        }

        .orders-empty p {
            color: var(--text-muted)
        }

        .order-card {
            background: var(--bg-card);
            border-radius: var(--radius-lg);
            border: 1px solid var(--border-color);
            padding: 1.5rem;
            margin-bottom: 1rem;
            transition: all 0.2s
        }

        .order-card:hover {
            border-color: var(--border-color-hover)
        }

        .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            flex-wrap: wrap;
            gap: 0.5rem
        }

        .order-id {
            font-family: var(--font-mono);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--accent)
        }

        .order-date {
            font-size: 0.8rem;
            color: var(--text-muted)
        }

        .order-status {
            padding: 4px 12px;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600
        }

        .status-completed {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success-light);
            border: 1px solid rgba(16, 185, 129, 0.3)
        }

        .status-failed {
            background: rgba(239, 68, 68, 0.15);
            color: var(--error-light);
            border: 1px solid rgba(239, 68, 68, 0.3)
        }

        .status-pending {
            background: rgba(245, 158, 11, 0.15);
            color: var(--warning);
            border: 1px solid rgba(245, 158, 11, 0.3)
        }

        .order-items {
            display: flex;
            gap: 0.5rem;
            flex-wrap: wrap;
            margin-bottom: 1rem
        }

        .order-item-thumb {
            width: 45px;
            height: 45px;
            border-radius: var(--radius-sm);
            overflow: hidden;
            border: 1px solid var(--border-color)
        }

        .order-item-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover
        }

        .order-footer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid var(--border-color);
            flex-wrap: wrap;
            gap: 0.5rem
        }

        .order-method {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.8rem;
            color: var(--text-muted)
        }

        .order-method-badge {
            padding: 2px 8px;
            border-radius: 4px;
            background: rgba(99, 102, 241, 0.1);
            font-size: 0.7rem;
            font-weight: 600;
            color: var(--primary-light)
        }

        .order-amount {
            font-size: 1.1rem;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text
        }

        .order-txn {
            font-size: 0.7rem;
            color: var(--text-muted);
            font-family: var(--font-mono);
            margin-top: 0.5rem
        }

        @media(max-width:480px) {
            .success-details {
                grid-template-columns: 1fr
            }

            .success-actions {
                flex-direction: column
            }
        }
    </style>
</head>

<body>
    <canvas id="particle-canvas"></canvas>
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-logo">
                <div class="logo-icon"><svg viewBox="0 0 40 40" fill="none">
                        <path d="M20 2L35 10V30L20 38L5 30V10L20 2Z" stroke="url(#lg1)" stroke-width="2" fill="none" />
                        <path d="M20 14L25 17V23L20 26L15 23V17L20 14Z" fill="url(#lg1)" />
                        <defs>
                            <linearGradient id="lg1" x1="0" y1="0" x2="40" y2="40">
                                <stop offset="0%" stop-color="#6366f1" />
                                <stop offset="100%" stop-color="#06b6d4" />
                            </linearGradient>
                        </defs>
                    </svg></div><span class="logo-text">Nova<span class="logo-accent">Pay</span></span>
            </a>
            <div class="nav-links" id="nav-links">
                <a href="index.html" class="nav-link">Home</a><a href="products.html" class="nav-link">Products</a>
                <a href="checkout.html" class="nav-link">Checkout</a><a href="gateway.html" class="nav-link">Payment
                    Gateway</a>
                <a href="orders.html" class="nav-link active">Orders</a>
            </div>
            <div class="nav-actions">
                <button class="nav-cart-btn" onclick="toggleCart()"><svg viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2">
                        <path d="M6 2L3 6v14a2 2 0 002 2h14a2 2 0 002-2V6l-3-4z" />
                        <line x1="3" y1="6" x2="21" y2="6" />
                        <path d="M16 10a4 4 0 01-8 0" />
                    </svg><span class="cart-badge" id="cart-badge">0</span></button>
                <button class="hamburger" onclick="toggleMobileMenu()"><span></span><span></span><span></span></button>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="page-header">
            <span class="section-tag">Transaction History</span>
            <h1 class="section-title">Your <span class="gradient-text">Orders</span></h1>
        </div>
        <!-- Success Banner (shown after payment) -->
        <div id="success-banner" style="display:none"></div>
        <!-- Orders List -->
        <div class="orders-container" id="orders-container"></div>
    </div>

    <div class="cart-overlay" id="cart-overlay" onclick="toggleCart()"></div>
    <aside class="cart-sidebar" id="cart-sidebar">
        <div class="cart-header">
            <h3>Shopping Cart</h3><button class="cart-close" onclick="toggleCart()"><svg viewBox="0 0 24 24" fill="none"
                    stroke="currentColor" stroke-width="2">
                    <line x1="18" y1="6" x2="6" y2="18" />
                    <line x1="6" y1="6" x2="18" y2="18" />
                </svg></button>
        </div>
        <div class="cart-items" id="cart-items">
            <div class="cart-empty" id="cart-empty">
                <p>Your cart is empty</p>
            </div>
        </div>
        <div class="cart-footer" id="cart-footer" style="display:none">
            <div class="cart-total"><span>Total</span><span class="cart-total-value" id="cart-total-value">₹0</span>
            </div>
        </div>
    </aside>
    <div class="toast-container" id="toast-container"></div>

    <script src="js/data.js"></script>
    <script src="js/cart.js"></script>
    <script src="js/particles.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            window.addEventListener('scroll', () => { document.getElementById('navbar')?.classList.toggle('scrolled', window.scrollY > 50); });

            const params = new URLSearchParams(window.location.search);
            const status = params.get('status');
            const orderId = params.get('order');

            // Show success banner
            if (status === 'success' && orderId) {
                const lastOrder = JSON.parse(localStorage.getItem('novapay_last_order') || '{}');
                const banner = document.getElementById('success-banner');
                banner.style.display = 'block';
                banner.innerHTML = `
                <div class="success-banner">
                    <div class="success-icon">🎉</div>
                    <h2>Payment Successful!</h2>
                    <p>Your order has been confirmed and is being processed.</p>
                    <div class="success-details">
                        <div class="success-detail"><div class="success-detail-label">Order ID</div><div class="success-detail-value">${lastOrder.orderId || orderId}</div></div>
                        <div class="success-detail"><div class="success-detail-label">Transaction ID</div><div class="success-detail-value">${lastOrder.txnId || 'N/A'}</div></div>
                        <div class="success-detail"><div class="success-detail-label">Amount Paid</div><div class="success-detail-value">${lastOrder.amount ? formatCurrency(lastOrder.amount) : 'N/A'}</div></div>
                        <div class="success-detail"><div class="success-detail-label">Payment Method</div><div class="success-detail-value">${(lastOrder.method || 'card').toUpperCase()}</div></div>
                    </div>
                    <div class="success-actions">
                        <a href="products.html" class="btn btn-primary">Continue Shopping</a>
                        <button class="btn btn-outline" onclick="window.print()">Print Receipt</button>
                    </div>
                </div>`;
                localStorage.removeItem('novapay_last_order');
            }

            // Render orders
            const orders = JSON.parse(localStorage.getItem('novapay_orders') || '[]');
            const container = document.getElementById('orders-container');

            if (orders.length === 0 && status !== 'success') {
                container.innerHTML = `
                <div class="orders-empty">
                    <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="1" width="100" height="100">
                        <rect x="10" y="10" width="60" height="60" rx="8"/><line x1="25" y1="28" x2="55" y2="28"/><line x1="25" y1="40" x2="55" y2="40"/><line x1="25" y1="52" x2="42" y2="52"/>
                    </svg>
                    <h3>No orders yet</h3>
                    <p>Start shopping to see your order history here</p>
                    <a href="products.html" class="btn btn-primary btn-lg">Browse Products</a>
                </div>`;
                return;
            }

            orders.forEach(order => {
                const date = new Date(order.date).toLocaleString('en-IN', { dateStyle: 'medium', timeStyle: 'short' });
                const methodIcons = { card: '💳', paypal: '🅿️', upi: '📱', netbanking: '🏦' };
                const card = document.createElement('div');
                card.className = 'order-card';
                card.innerHTML = `
                <div class="order-header">
                    <div><div class="order-id">${order.orderId}</div><div class="order-date">${date}</div></div>
                    <span class="order-status status-${order.status}">${order.status === 'completed' ? '✓ Completed' : order.status === 'failed' ? '✗ Failed' : '⏳ Pending'}</span>
                </div>
                <div class="order-items">${(order.items || []).map(i => `<div class="order-item-thumb"><img src="${i.image}" alt="${i.name}"></div>`).join('')}</div>
                <div class="order-footer">
                    <div class="order-method">${methodIcons[order.method] || '💳'} <span class="order-method-badge">${(order.method || 'card').toUpperCase()}</span>${order.reason ? `<span style="color:var(--error);font-size:0.75rem">— ${order.reason}</span>` : ''}</div>
                    <div class="order-amount">${formatCurrency(order.amount)}</div>
                </div>
                <div class="order-txn">TXN: ${order.txnId}</div>`;
                container.appendChild(card);
            });

            cart.renderCartSidebar();
        });
    </script>
</body>

</html>
